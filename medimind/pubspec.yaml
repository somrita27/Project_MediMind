name: medimind
description: MediMind - Your AI Health Companion
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.8
  cloud_firestore: ^4.15.8
  firebase_storage: ^11.6.9
 

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.0

  # Notifications
  flutter_local_notifications: ^17.1.2
  timezone: ^0.9.4

  # Image
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1

  # HTTP
  http: ^1.2.1
  dio: ^5.4.3

  # UI
  flutter_animate: ^4.5.0
  lottie: ^3.1.0
  shimmer: ^3.0.0
  intl: ^0.19.0
  fl_chart: ^0.67.0

  # Permissions
  permission_handler: ^11.3.0

  # Storage
  shared_preferences: ^2.2.3

  # Icons
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.10+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/